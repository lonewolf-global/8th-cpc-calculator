kind = "web"
previewPath = "/"
title = "8th CPC Salary Calculator"
version = "1.0.0"
id = "artifacts/8cpc-calculator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19967

[services.development]
run = "pnpm --filter @workspace/8cpc-calculator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/8cpc-calculator", "run", "build" ]
publicDir = "artifacts/8cpc-calculator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19967"
BASE_PATH = "/"
