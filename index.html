<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>8th CPC Salary Calculator</title>
  <link rel="stylesheet" href="style.css">
  <title>8th CPC Salary Calculator 2026</title>
<meta name="description" content="Calculate your expected salary under 8th Pay Commission with fitment factor, DA and HRA.">
<meta name="keywords" content="8th CPC calculator, 8th pay commission salary, fitment factor">
</head>
<body>

<div class="container">
  <h1>8th CPC Calculator</h1>

  <div class="card">
    <label>Current Basic Pay (₹)</label>
    <input type="number" id="basic" placeholder="e.g. 30000">

    <label>DA (%)</label>
    <input type="number" id="da" value="50">

    <label>Fitment Factor</label>
    <input type="number" id="fitment" value="2.5" step="0.1">

    <label>HRA Category</label>
    <select id="hra">
      <option value="0.27">X (27%)</option>
      <option value="0.18">Y (18%)</option>
      <option value="0.09">Z (9%)</option>
    </select>

    <label>
      <input type="checkbox" id="mergeDA" checked>
      Merge DA before fitment
    </label>

    <button onclick="calculate()">Calculate</button>
  </div>

  <div class="result" id="result"></div>
</div>

<script src="script.js"></script>
</body>
</html>
